<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>modded</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/HamCraft-UB/Singlefile@main/assets/games.css">
<link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/HamCraft-UB/Singlefile@main/assets/hamcraft-ub-icon.png">

</head>

<body>

<div class="top">
  <h1>HamCraft UB</h1>
  <p>Apps</p>
</div>

<div>
 
  <a target="_blank" class="bloxy-rainbow-btn bloxy-btn" href="https://bloxcraft-ubg.pages.dev?utm_source=hamcraft-ub.github.io">More Apps</a>
</div>

<div id="controls">
  <input id="searchBox" placeholder="Search games..." />
</div>

<div>
  <p id="gameCount">Apps: 0</p>
</div>

<div id="views">
<p>Scroll down to see all games</p>
</div>

<div class="wrap">
  <div id="gameGrid" class="grid"></div>
  <div id="status" style="display:none; padding:24px;">Loading...</div>
</div>

<div id="viewerOverlay">
  <div id="viewerWindow">
    <div id="viewerHeader">
      <span id="viewerTitle">Loading...</span>
      <div>
        <button id="newTabBtn">New Tab</button>
        <button id="closeBtn">Close</button>
      </div>
    </div>
    <iframe id="viewerFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-top-navigation-by-user-activation"></iframe>
  </div>
</div>
<script>const grid = document.getElementById('gameGrid');
const overlay = document.getElementById('viewerOverlay');
const frame = document.getElementById('viewerFrame');
const closeBtn = document.getElementById('closeBtn');
const newTabBtn = document.getElementById('newTabBtn');
const status = document.getElementById('status');
const searchBox = document.getElementById('searchBox');
const gameCountEl = document.getElementById('gameCount');
const viewerTitle = document.getElementById('viewerTitle');

const HTML_BASE_URL = 'https://cdn.jsdelivr.net/gh/gn-math/html@master';

let games = [];
let filteredGames = [];
let currentGameUrl = '';

const imageObserver = new IntersectionObserver((entries, observer) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      img.src = img.dataset.src;
      observer.unobserve(img);
    }
  });
}, {
  rootMargin: '200px'
});

function createCardElement(game) {
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.loading = 'lazy';
  img.dataset.src = game.cover.replace('{COVER_URL}', 'https://cdn.jsdelivr.net/gh/gn-math/covers@main');

  imageObserver.observe(img);

  const title = document.createElement('h3');
  title.textContent = game.name;

  card.appendChild(img);
  card.appendChild(title);

  card.onclick = () => openGame(game.url, game.name);

  return card;
}

async function loadGames() {
  status.style.display = 'block';
  status.textContent = "Loading games...";
  try {
    const res = await fetch('https://cdn.jsdelivr.net/gh/nobody81754/modded-htmls@latest/Others/apps1.1.json', { cache: "no-store" });
    const data = await res.json();
    console.log(data);

    games = data
      .filter(g => g.id >= 0 && !g.name.includes('[!]'))
      .map(g => ({
        ...g
      }));

    filteredGames = [...games];

    grid.innerHTML = "";
    filteredGames.forEach(game => {
      grid.appendChild(createCardElement(game));
    });

    gameCountEl.textContent = `Apps: ${games.length}`;
    status.style.display = 'none';
  } catch (e) {
  console.log(e);
    status.textContent = "ERROR loading games.";
  }
}

searchBox.addEventListener('input', () => {
  const q = searchBox.value.toLowerCase().trim();
  filteredGames = games.filter(g => g.name.toLowerCase().includes(q));

  grid.innerHTML = "";
  filteredGames.forEach(game => {
    grid.appendChild(createCardElement(game));
  });
});

async function openGame(url, name) {
  overlay.style.display = 'flex';
  viewerTitle.textContent = name || url;
  currentGameUrl = url;

  try {
    const res = await fetch(url);
    const html = await res.text();
    const doc = frame.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
  } catch (err) {
    console.error(err);
    frame.src = 'about:blank';
  }
}

closeBtn.onclick = () => {
  overlay.style.display = 'none';
  frame.src = 'about:blank';
  currentGameUrl = '';
};

newTabBtn.onclick = async () => {
  if (!currentGameUrl) return;

  try {
    const res = await fetch(currentGameUrl);
    const html = await res.text();

    const win = window.open('about:blank', '_blank');
    if (!win) return;

    win.document.open();
    win.document.write(html);
    win.document.close();
  } catch (err) {
    console.error('Failed to open in new tab:', err);
  }
};

loadGames();</script>

</body>
</html>
